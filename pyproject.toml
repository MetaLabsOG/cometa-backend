[tool.pytest.ini_options]
addopts = "-ra --strict-config --strict-markers"
pythonpath = ["."]
testpaths = ["tests"]

[tool.coverage.run]
branch = true

[tool.coverage.report]
show_missing = true
skip_covered = true

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["B", "E4", "E7", "E9", "F", "I"]

[tool.ruff.format]
docstring-code-format = true
indent-style = "space"
line-ending = "lf"
quote-style = "double"

[tool.mypy]
files = [
    "core/circuit_breaker.py",
    "flex/blockchain/contract_state.py",
    "flex/application/asset_transfers.py",
    "flex/domain/allocation.py",
    "flex/domain/pricing.py",
    "flex/domain/transactions.py",
    "flex/providers/pact.py",
]
follow_imports = "skip"
python_version = "3.12"
strict = true
pretty = true
show_error_codes = true
warn_unreachable = true
