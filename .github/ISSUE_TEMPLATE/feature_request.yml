name: Feature request
description: Propose a focused product or engineering improvement
title: "feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operational problem should this solve?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe observable behavior, not a preferred implementation.
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints and risks
      description: Note API compatibility, financial correctness, migrations, or provider limits.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What simpler approaches or workarounds were evaluated?
