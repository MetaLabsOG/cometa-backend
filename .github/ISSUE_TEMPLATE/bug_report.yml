name: Bug report
description: Report a reproducible backend defect
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Do not include credentials, wallet mnemonics,
        private logs, or exploitable security details. Use private vulnerability
        reporting for security issues.
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide redacted requests, inputs, or steps.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: "2.1.0 or a7acd29"
  - type: dropdown
    id: network
    attributes:
      label: Algorand network
      options:
        - mainnet
        - testnet
        - localnet
        - not applicable
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add redacted logs or screenshots if they are necessary.
