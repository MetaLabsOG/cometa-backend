name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pipenv
      - run: python -m pip install --disable-pip-version-check pipenv==2024.4.0
      - run: pipenv sync --dev
      - run: pipenv run ruff check env.py core/decorators.py flex/__init__.py flex/db/classes/collection_manager.py scripts/verify_algorand_credentials.py tests
      - run: pipenv run pytest --cov=core.decorators --cov=flex.db.classes.collection_manager --cov-report=term-missing --cov-fail-under=50

  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: node --check js/index.js
      - run: node --check js/commands.mjs
      - run: npm --prefix js test
