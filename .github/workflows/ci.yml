name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pipenv
      - run: python -m pip install --disable-pip-version-check pipenv==2024.4.0
      - run: pipenv verify
      - run: pipenv sync --dev
      - name: Lint maintained modules
        run: make lint
      - name: Check formatting
        run: make format-check
      - name: Type-check new domain boundaries
        run: make typecheck
      - name: Test full suite with focused coverage ratchet
        run: make test

  javascript:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"
      - run: node --check js/index.js
      - run: node --check js/commands.mjs
      - run: make test-js

  configuration:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Validate Compose configuration
        env:
          ALGOD_TOKEN: ci-placeholder
        run: |
          cp .env.example .env
          docker compose config --quiet
