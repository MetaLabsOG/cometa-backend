version: '3.9'

services:
    app:
        build: .
        restart: always
        entrypoint: scripts/run.sh
        env_file:
            - .env
        volumes:
            - ".:/app"
            - "/tmp/cometa-${ALGO_NETWORK}:/tmp"
        ports:
            - "${SERVER_PORT}:${SERVER_PORT}"
        expose:
            - "${SERVER_PORT}"
        depends_on:
            - mongodb
#            - redis
        logging:
            driver: json-file
            options:
                max-size: "5m"
                max-file: "20"

    mongodb:
        image: mongo
        restart: always
        command: mongod --port ${MONGODB_PORT}
        volumes:
            - "/var/lib/mongodb-${ALGO_NETWORK}:/data/db"

#    redis:
#        image: redis
#        restart: always
#        ports:
#            - "${REDIS_PORT}:${REDIS_PORT}"
