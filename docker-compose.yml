services:
  app:
    build:
      context: .
    image: "cometa-backend:${COMETA_IMAGE_TAG:-local}"
    init: true
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${SERVER_PORT:-8000}:${SERVER_PORT:-8000}"
    expose:
      - "${SERVER_PORT:-8000}"
    depends_on:
      mongodb:
        condition: service_healthy
      algod:
        condition: service_started
    tmpfs:
      - /tmp:rw,nosuid,size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "20"

  mongodb:
    # Set MONGODB_IMAGE to the exact version already validated against the
    # existing data directory before changing it in production.
    image: "${MONGODB_IMAGE:-mongo:7.0.28@sha256:4510cf3d7050003e958745adb25d2deb3fb907430716162d9cc1a92eda2a6047}"
    restart: unless-stopped
    command: mongod --port ${MONGODB_PORT:-27017}
    volumes:
      - "/var/lib/mongodb-${ALGO_NETWORK:-mainnet}:/data/db"
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--port",
          "${MONGODB_PORT:-27017}",
          "--eval",
          "quit(db.adminCommand('ping').ok ? 0 : 2)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  algod:
    image: "${ALGOD_IMAGE:-algorand/algod@sha256:9c667451da575abcf325c631bd24f845f051122e689628eba1c83daa3ebd3cbc}"
    restart: unless-stopped
    environment:
      NETWORK: "${ALGO_NETWORK:-mainnet}"
      FAST_CATCHUP: "1"
      TOKEN: "${ALGOD_TOKEN}"
    volumes:
      - algod-data:/algod/data
    ports:
      - "127.0.0.1:4190:8080"

volumes:
  algod-data:
    name: "cometa-algod-${ALGO_NETWORK:-mainnet}"
