version: '3.9'

services:
    app:
        build: .
        restart: always
        entrypoint: scripts/run.sh
        environment:
            REACH_NO_WARN: "${REACH_NO_WARN}"
            PYTHONUNBUFFERED: 1
        volumes:
            - ".:/app"
            - "/tmp/cometa:/tmp"
        ports:
            - "${SERVER_PORT}:${SERVER_PORT}"
        depends_on:
            - mongodb

    bot:
        build: .
        restart: always
        entrypoint: scripts/bot/run.sh
        environment:
            REACH_NO_WARN: "${REACH_NO_WARN}"
            PYTHONUNBUFFERED: 1
        volumes:
            - ".:/app"
            - "/tmp/bot:/tmp"
        depends_on:
            - mongodb
        profiles:
            - "mainnet"

    mongodb:
        image: mongo
        restart: always
        command: mongod --port ${MONGODB_PORT}
        volumes:
            - "/var/lib/mongodb-${ALGO_NETWORK}:/data/db"
