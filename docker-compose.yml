version: '3.9'

services:
    app:
        build: .
        restart: always
        entrypoint: scripts/run.sh
        env_file:
            - .env
        volumes:
            - ".:/app"
            - "/tmp/cometa-${ALGO_NETWORK}:/tmp"
        ports:
            - "${SERVER_PORT}:${SERVER_PORT}"
        expose:
            - "${SERVER_PORT}"
        depends_on:
            - mongodb
            - algod
        logging:
            driver: json-file
            options:
                max-size: "5m"
                max-file: "20"

    mongodb:
        image: mongo
        restart: always
        command: mongod --port ${MONGODB_PORT}
        volumes:
            - "/var/lib/mongodb-${ALGO_NETWORK}:/data/db"

    algod:
        image: algorand/algod:latest
        container_name: algod-node
        restart: unless-stopped
        environment:
            - NETWORK=mainnet
            - FAST_CATCHUP=1           # snapshot-based fast sync
            - TOKEN=${ALGOD_TOKEN}     # 64+ char API key for REST
        volumes:
            - algod-data:/algod/data   # persists ~20 GB ledger
        ports:
            - "127.0.0.1:4190:8080"    # bind REST API to localhost

volumes:
  algod-data:
