version: '3.3'

services:
    prod:
        build: .
        restart: always
        entrypoint: ./scripts/docker-entry.sh
        environment:
            COMETA_ENVIRONMENT: "prod"
        env_file:
            - ".env.prod"
        volumes:
            - .:/app
        ports:
            - "5000:5000"
        network_mode: host

    test:
        build: .
        restart: always
        entrypoint: ./scripts/docker-entry.sh
        environment:
            COMETA_ENVIRONMENT: "test"
        env_file:
            - ".env.test"
        volumes:
            - .:/app
        ports:
            - "5001:5001"
        network_mode: host